name: Traffic Tracker

on:
  schedule:
    - cron: '0 0 * * *'  # Her gün saat 00:00 UTC
  workflow_dispatch:

jobs:
  track-traffic:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Track traffic
        run: python traffic_tracker.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: NinurtaKalhu
          GITHUB_REPOSITORY_NAME: Elite-Dangerous-Multi-Route-Optimizer

      - name: Commit and push
        run: |
          git config user.name "Traffic Bot"
          git config user.email "bot@edmrn"
          git add traffic_history.json
          git commit -m "chore: Update traffic data [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push origin main
