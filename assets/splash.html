<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDMRN Splash - Sol System + Galaxy Drift</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0a0a0f;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { text-align: center; }
        
        .splash-frame {
            width: 500px;
            height: 400px;
            background: radial-gradient(ellipse at 50% 50%, #080818 0%, #030308 100%);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            border: 2px solid #1a1a1a;
        }
        
        /* Deep space layer - moves slowly (galactic background) */
        .deep-space {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            animation: galacticDrift 60s linear infinite;
        }
        
        @keyframes galacticDrift {
            0% { transform: translate(0, 0); }
            25% { transform: translate(30px, -15px); }
            50% { transform: translate(60px, 0); }
            75% { transform: translate(30px, 15px); }
            100% { transform: translate(0, 0); }
        }
        
        /* Nebula clouds - subtle galactic features */
        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.15;
        }
        
        .nebula-1 {
            width: 200px;
            height: 120px;
            background: radial-gradient(ellipse, #4a2080, transparent);
            top: 20%;
            left: 10%;
        }
        
        .nebula-2 {
            width: 150px;
            height: 100px;
            background: radial-gradient(ellipse, #1a4060, transparent);
            top: 60%;
            right: 15%;
        }
        
        .nebula-3 {
            width: 180px;
            height: 80px;
            background: radial-gradient(ellipse, #603020, transparent);
            bottom: 25%;
            left: 30%;
        }
        
        /* Background stars - drift with galaxy */
        .bg-stars {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        
        .bg-star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
        }
        
        /* Milky Way band - subtle diagonal glow */
        .milky-way {
            position: absolute;
            width: 150%;
            height: 80px;
            top: 35%;
            left: -25%;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(200,180,140,0.03) 20%, 
                rgba(200,180,140,0.06) 50%, 
                rgba(200,180,140,0.03) 80%, 
                transparent 100%);
            transform: rotate(-20deg);
            filter: blur(15px);
        }
        
        /* Solar system - orbits within galaxy */
        .solar-system-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: solarDrift 20s ease-in-out infinite;
        }
        
        @keyframes solarDrift {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(8px, -4px) rotate(0.5deg); }
            50% { transform: translate(15px, 0) rotate(1deg); }
            75% { transform: translate(8px, 4px) rotate(0.5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        
        .solar-system {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        
        /* Sun */
        .sun {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 36px;
            background: radial-gradient(circle, #fff 0%, #ffdd00 20%, #ff8c00 50%, #ff4400 80%, transparent 100%);
            border-radius: 50%;
            box-shadow: 0 0 25px #ff8c00, 0 0 50px #ff6600, 0 0 80px #ff440066;
            z-index: 10;
        }
        
        /* Orbit paths */
        .orbit {
            position: absolute;
            left: 50%;
            top: 50%;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        
        .orbit-mercury { width: 60px; height: 60px; }
        .orbit-venus { width: 85px; height: 85px; }
        .orbit-earth { width: 120px; height: 120px; }
        .orbit-mars { width: 155px; height: 155px; }
        .orbit-jupiter { width: 230px; height: 230px; }
        .orbit-saturn { width: 310px; height: 310px; }
        
        /* Planet orbit containers */
        .planet-orbit {
            position: absolute;
            left: 50%;
            top: 50%;
            transform-origin: center center;
        }
        
        .planet {
            position: absolute;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        
        /* Mercury */
        .orbit-mercury-container { width: 60px; height: 60px; margin-left: -30px; margin-top: -30px; animation: orbit 3.5s linear infinite; }
        .planet-mercury { width: 5px; height: 5px; background: radial-gradient(circle at 30% 30%, #c9c0b3, #8a8279); left: 0; top: 50%; }
        
        /* Venus */
        .orbit-venus-container { width: 85px; height: 85px; margin-left: -42.5px; margin-top: -42.5px; animation: orbit 6s linear infinite; }
        .planet-venus { width: 9px; height: 9px; background: radial-gradient(circle at 30% 30%, #ffd085, #c9a227); left: 0; top: 50%; }
        
        /* Earth + Moon */
        .orbit-earth-container { width: 120px; height: 120px; margin-left: -60px; margin-top: -60px; animation: orbit 9s linear infinite; }
        .planet-earth { width: 10px; height: 10px; background: radial-gradient(circle at 30% 30%, #6b93d6, #1a5276); left: 0; top: 50%; box-shadow: 0 0 5px #4a90d9; }
        .moon-orbit { position: absolute; width: 20px; height: 20px; left: -5px; top: calc(50% - 5px); animation: orbit 1.8s linear infinite reverse; }
        .moon { width: 3px; height: 3px; background: #aaa; border-radius: 50%; position: absolute; left: 0; top: 50%; transform: translate(-50%, -50%); }
        
        /* Mars + Moons */
        .orbit-mars-container { width: 155px; height: 155px; margin-left: -77.5px; margin-top: -77.5px; animation: orbit 12s linear infinite; }
        .planet-mars { width: 8px; height: 8px; background: radial-gradient(circle at 30% 30%, #e27b58, #993d1d); left: 0; top: 50%; }
        .moon-orbit-phobos { position: absolute; width: 22px; height: 22px; left: -7px; top: calc(50% - 7px); animation: orbit 1.2s linear infinite; }
        .moon-phobos { width: 2px; height: 2px; background: #888; border-radius: 50%; position: absolute; left: 0; top: 50%; transform: translate(-50%, -50%); }
        .moon-orbit-deimos { position: absolute; width: 30px; height: 30px; left: -11px; top: calc(50% - 11px); animation: orbit 2s linear infinite reverse; }
        .moon-deimos { width: 2px; height: 2px; background: #777; border-radius: 50%; position: absolute; left: 0; top: 50%; transform: translate(-50%, -50%); }
        
        /* Jupiter + Moons */
        .orbit-jupiter-container { width: 230px; height: 230px; margin-left: -115px; margin-top: -115px; animation: orbit 20s linear infinite; }
        .planet-jupiter { width: 18px; height: 18px; background: radial-gradient(circle at 30% 30%, #d4a574, #a0522d); left: 0; top: 50%; box-shadow: 0 0 4px #a0522d; }
        .jupiter-band { position: absolute; width: 100%; height: 2px; background: #8b4513; border-radius: 50%; opacity: 0.5; }
        .jupiter-band:nth-child(1) { top: 35%; }
        .jupiter-band:nth-child(2) { top: 55%; }
        .jupiter-band:nth-child(3) { top: 70%; }
        
        .moon-orbit-io { position: absolute; width: 30px; height: 30px; left: -9px; top: calc(50% - 9px); animation: orbit 1s linear infinite; }
        .moon-io { width: 3px; height: 3px; background: #f4d03f; border-radius: 50%; position: absolute; left: 0; top: 50%; transform: translate(-50%, -50%); }
        
        .moon-orbit-europa { position: absolute; width: 38px; height: 38px; left: -13px; top: calc(50% - 13px); animation: orbit 1.5s linear infinite reverse; }
        .moon-europa { width: 3px; height: 3px; background: #d5e8f0; border-radius: 50%; position: absolute; left: 0; top: 50%; transform: translate(-50%, -50%); }
        
        .moon-orbit-ganymede { position: absolute; width: 46px; height: 46px; left: -17px; top: calc(50% - 17px); animation: orbit 2.2s linear infinite; }
        .moon-ganymede { width: 4px; height: 4px; background: #b8a88a; border-radius: 50%; position: absolute; left: 0; top: 50%; transform: translate(-50%, -50%); }
        
        .moon-orbit-callisto { position: absolute; width: 54px; height: 54px; left: -21px; top: calc(50% - 21px); animation: orbit 3.2s linear infinite reverse; }
        .moon-callisto { width: 4px; height: 4px; background: #6b6b6b; border-radius: 50%; position: absolute; left: 0; top: 50%; transform: translate(-50%, -50%); }
        
        /* Saturn + Rings + Moons */
        .orbit-saturn-container { width: 310px; height: 310px; margin-left: -155px; margin-top: -155px; animation: orbit 30s linear infinite; }
        .planet-saturn { width: 15px; height: 15px; background: radial-gradient(circle at 30% 30%, #f4d590, #c9a227); left: 0; top: 50%; }
        .saturn-ring { position: absolute; width: 34px; height: 8px; left: -9.5px; top: calc(50% - 1px); border: 2px solid rgba(200, 180, 140, 0.5); border-radius: 50%; transform: rotateX(75deg); }
        .saturn-ring-inner { position: absolute; width: 26px; height: 6px; left: -5.5px; top: calc(50% + 1px); border: 1px solid rgba(200, 180, 140, 0.3); border-radius: 50%; transform: rotateX(75deg); }
        
        .moon-orbit-titan { position: absolute; width: 50px; height: 50px; left: -18px; top: calc(50% - 18px); animation: orbit 2.5s linear infinite; }
        .moon-titan { width: 4px; height: 4px; background: #e8a84c; border-radius: 50%; position: absolute; left: 0; top: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 3px #e8a84c; }
        
        .moon-orbit-enceladus { position: absolute; width: 34px; height: 34px; left: -10px; top: calc(50% - 10px); animation: orbit 1.5s linear infinite reverse; }
        .moon-enceladus { width: 2px; height: 2px; background: #e8e8e8; border-radius: 50%; position: absolute; left: 0; top: 50%; transform: translate(-50%, -50%); }
        
        @keyframes orbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Velocity vector - shows direction of galactic motion */
        .velocity-vector {
            position: absolute;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0.4;
        }
        
        .velocity-arrow {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ff8c00);
            position: relative;
        }
        
        .velocity-arrow::after {
            content: '';
            position: absolute;
            right: 0;
            top: -3px;
            border: 4px solid transparent;
            border-left: 6px solid #ff8c00;
        }
        
        .velocity-label {
            font-size: 0.5em;
            color: #ff8c00;
            letter-spacing: 1px;
        }
        
        /* Bottom info */
        .bottom-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 25px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }
        
        .logo-img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(255,140,0,0.5));
            position: absolute;
            left: 25px;
            bottom: 50px;
        }
        
        .tagline {
            font-size: 0.65em;
            color: #555;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        
        .progress-bar {
            width: 100%;
            height: 2px;
            background: #1a1a1a;
            border-radius: 2px;
            margin-bottom: 5px;
        }
        
        .progress-fill {
            width: 45%;
            height: 100%;
            background: linear-gradient(90deg, #ff8c00, #ffcc00);
            border-radius: 2px;
        }
        
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status {
            font-size: 0.55em;
            color: #ff8c00;
        }
        
        .version {
            font-size: 0.55em;
            color: #9c9c9c;
        }
        
        .label {
            margin-top: 30px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="splash-frame">
            <!-- Deep space layer - galactic background drift -->
            <div class="deep-space">
                <div class="nebula nebula-1"></div>
                <div class="nebula nebula-2"></div>
                <div class="nebula nebula-3"></div>
                <div class="milky-way"></div>
                <div class="bg-stars" id="bgStars"></div>
            </div>
            
            <!-- Solar system with galactic drift -->
            <div class="solar-system-wrapper">
                <div class="solar-system">
                    <!-- Orbit paths -->
                    <div class="orbit orbit-mercury"></div>
                    <div class="orbit orbit-venus"></div>
                    <div class="orbit orbit-earth"></div>
                    <div class="orbit orbit-mars"></div>
                    <div class="orbit orbit-jupiter"></div>
                    <div class="orbit orbit-saturn"></div>
                    
                    <!-- Sun -->
                    <div class="sun"></div>
                    
                    <!-- Mercury -->
                    <div class="planet-orbit orbit-mercury-container">
                        <div class="planet planet-mercury"></div>
                    </div>
                    
                    <!-- Venus -->
                    <div class="planet-orbit orbit-venus-container">
                        <div class="planet planet-venus"></div>
                    </div>
                    
                    <!-- Earth + Moon -->
                    <div class="planet-orbit orbit-earth-container">
                        <div class="planet planet-earth">
                            <div class="moon-orbit">
                                <div class="moon"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Mars + Moons -->
                    <div class="planet-orbit orbit-mars-container">
                        <div class="planet planet-mars">
                            <div class="moon-orbit-phobos">
                                <div class="moon-phobos"></div>
                            </div>
                            <div class="moon-orbit-deimos">
                                <div class="moon-deimos"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Jupiter + Moons -->
                    <div class="planet-orbit orbit-jupiter-container">
                        <div class="planet planet-jupiter">
                            <div class="jupiter-band"></div>
                            <div class="jupiter-band"></div>
                            <div class="jupiter-band"></div>
                            <div class="moon-orbit-io">
                                <div class="moon-io"></div>
                            </div>
                            <div class="moon-orbit-europa">
                                <div class="moon-europa"></div>
                            </div>
                            <div class="moon-orbit-ganymede">
                                <div class="moon-ganymede"></div>
                            </div>
                            <div class="moon-orbit-callisto">
                                <div class="moon-callisto"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Saturn + Rings + Moons -->
                    <div class="planet-orbit orbit-saturn-container">
                        <div class="planet planet-saturn">
                            <div class="saturn-ring"></div>
                            <div class="saturn-ring-inner"></div>
                            <div class="moon-orbit-titan">
                                <div class="moon-titan"></div>
                            </div>
                            <div class="moon-orbit-enceladus">
                                <div class="moon-enceladus"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
                   
            <!-- Bottom Info -->
            <div class="bottom-info">
                <img src="edmrn_logo.png" class="logo-img" alt="EDMRN">
                <div class="tagline">Elite Dangerous Multi Route Navigation</div>
                <div class="progress-bar"><div class="progress-fill"></div></div>
                <div class="status-row">
                    <div class="status">Welcome home, Commander. EDMRN routing services are at your disposal</div>
                    <div class="version">v3.3.0 | CMDR Ninurta KALHU</div>
                </div>
            </div>
        </div>
        
        <div class="label">Sol System + Galactic Drift Animation</div>
    </div>
    
    <script>
        // Generate background stars (move with galaxy)
        const bgStars = document.getElementById('bgStars');
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.className = 'bg-star';
            const size = Math.random() < 0.8 ? 1 : (Math.random() < 0.9 ? 1.5 : 2);
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.opacity = Math.random() * 0.5 + 0.1;
            
            // Random colors for stars
            const colors = ['#fff', '#ffddaa', '#aaddff', '#ffcccc', '#ffffcc'];
            star.style.background = colors[Math.floor(Math.random() * colors.length)];
            
            bgStars.appendChild(star);
        }
    </script>
</body>
</html>
